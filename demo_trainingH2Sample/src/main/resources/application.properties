spring.application.name=demo_trainingH2
spring.h2.console.enabled=true
spring.datasource.url=jdbc:h2:mem:testdb
spring.jpa.hibernate.ddl-auto=update


management.info.env.enabled=true
info.app.name=${spring.application.name}
info.app.version=@project.version@
info.app.description=Training app with H2 and Actuator health checks

# --- Actuator (management) ---
# Expose endpoints you need. 'health' is the minimum; 'info' is optional.
management.endpoints.web.exposure.include=health,info,mappings,beans

# Base path for actuator endpoints (default in Boot 2.7 is /actuator)
management.endpoints.web.base-path=/actuator

# Show health details always (handy in dev; restrict in prod)
management.endpoint.health.show-details=always

# Enable health groups for k8s/docker readiness/liveness-style checks
management.health.probes.enabled=true
